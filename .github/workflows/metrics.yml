          # plugin_stackoverflow: yes
          # plugin_stackoverflow_user: YOUR_STACKOVERFLOW_USER_ID
          # plugin_stackoverflow_sections: answers-top, questions-top
          # plugin_stackoverflow_limit: 4
          # plugin_stackoverflow_lines: 4
          # plugin_stackoverflow_lines_snippet: 2

          # # Plugin: WakaTime
          # plugin_wakatime: yes
          # plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          # plugin_wakatime_user: nqd2
          # plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          # plugin_wakatime_days: 7
          # plugin_wakatime_limit: 8
          # plugin_wakatime_languages_other: yes

          # # Plugin: AniList
          # plugin_anilist: yes
          # plugin_anilist_user: YOUR_ANILIST_USERNAME
          # plugin_anilist_medias: anime, manga
          # plugin_anilist_sections: favorites, watching, reading, characters
          # plugin_anilist_limit: 4
          # plugin_anilist_limit_characters: 8
          # plugin_anilist_shuffle: yes

          # # Plugin: Music
          # plugin_music: yes
          # plugin_music_provider: spotify
          # plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          # plugin_music_user: YOUR_SPOTIFY_USER_ID
          # plugin_music_mode: recent
          # plugin_music_limit: 4
          # plugin_music_played_at: yes
          # plugin_music_time_range: short
          # plugin_music_top_type: tracks

          # # Plugin: Steam
          # plugin_steam: yes
          # plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          # plugin_steam_user: YOUR_STEAM_ID
          # plugin_steam_sections: player, recently-played, most-played
          # plugin_steam_games_limit: 4
          # plugin_steam_recent_games_limit: 4
