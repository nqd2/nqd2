name: Metrics

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: nqd2
          template: classic
          filename: github-metrics.svg

          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh
          config_display: large
          config_animations: yes
          config_twemoji: yes
          config_gemoji: yes
          config_octicon: yes
          plugins_errors_fatal: no

          # =========================
          # Plugin: Introduction
          # =========================
          plugin_introduction: yes
          plugin_introduction_title: yes

          # =========================
          # Plugin: Languages
          # =========================
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage, bytes-size

          # =========================
          # Plugin: Lines of code
          # =========================
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 50
          plugin_lines_sections: base, repositories, history
          plugin_lines_skipped: ""

          # =========================
          # Plugin: Traffic
          # =========================
          plugin_traffic: yes
          plugin_traffic_skipped: ""

          # =========================
          # Plugin: Follow-up
          # =========================
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes
          plugin_followup_archived: yes

          # =========================
          # Plugin: Activity
          # =========================
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 8
          plugin_activity_load: 300
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes

          # =========================
          # Plugin: Achievements
          # =========================
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # =========================
          # Plugin: Notable contributions
          # =========================
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_self: yes

          # =========================
          # Plugin: Discussions
          # =========================
          plugin_discussions: yes
          plugin_discussions_categories: yes
          plugin_discussions_categories_limit: 8

          # =========================
          # Plugin: Stargazers
          # =========================
          plugin_stargazers: yes
          plugin_stargazers_days: 365
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_sample: 200

          # =========================
          # Plugin: Stars
          # =========================
          plugin_stars: yes
          plugin_stars_limit: 8

          # =========================
          # Plugin: Starred topics
          # =========================
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_sort: stars
          plugin_topics_limit: 15

          # =========================
          # Plugin: Isometric commit calendar
          # =========================
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # =========================
          # Plugin: Commit calendar
          # =========================
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # =========================
          # Plugin: Coding habits
          # =========================
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          # =========================
          # Plugin: Repository contributors
          # =========================
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: code, issue, pull-request, review

          # =========================
          # Plugin: Comment reactions
          # =========================
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_limit_issues: 100
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_days: 14
          plugin_reactions_display: absolute
          plugin_reactions_details: percentage

          # =========================
          # Plugin: People
          # =========================
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_people_shuffle: yes

          # =========================
          # Plugin: GitHub Sponsors / Sponsorships
          # =========================
          plugin_sponsors: yes
          plugin_sponsors_sections: goal, list
          plugin_sponsors_past: yes
          plugin_sponsors_size: 24
          plugin_sponsors_title: Sponsors

          plugin_sponsorships: yes
          plugin_sponsorships_sections: amount, sponsors
          plugin_sponsorships_size: 24

          # =========================
          # Plugin: Featured repositories
          # =========================
          plugin_repositories: yes
          plugin_repositories_featured: nqd2/nqd2
          plugin_repositories_pinned: 6
          plugin_repositories_starred: 4
          plugin_repositories_random: 4
          plugin_repositories_forks: yes
          plugin_repositories_affiliations: owner, collaborator, organization_member

          # =========================
          # Plugin: Star lists
          # =========================
          plugin_starlists: yes
          plugin_starlists_limit: 4
          plugin_starlists_limit_repositories: 2
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8
          plugin_starlists_shuffle_repositories: yes

          # =========================
          # Plugin: Random code snippet
          # =========================
          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_days: 14
          plugin_code_visibility: public

          # =========================
          # Plugin: Gists
          # =========================
          plugin_gists: yes

          # =========================
          # Plugin: GitHub Projects
          # =========================
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes

          # =========================
          # Plugin: GitHub Skyline
          # =========================
          plugin_skyline: yes
          plugin_skyline_year: 2025
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.5
          plugin_skyline_compatibility: yes

          # =========================
          # Plugin: Repository licenses
          # =========================
          plugin_licenses: yes
          plugin_licenses_ratio: yes
          plugin_licenses_legal: yes

          # =========================
          # Plugin: Google PageSpeed
          # Không cần token nhưng có token thì quota tốt hơn
          # =========================
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://github.com/nqd2
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: yes
          plugin_pagespeed_pwa: yes

          # =========================
          # Plugin: Website screenshot
          # =========================
          plugin_screenshot: yes
          plugin_screenshot_title: GitHub Profile
          plugin_screenshot_url: https://github.com/nqd2
          plugin_screenshot_selector: body
          plugin_screenshot_mode: image
          plugin_screenshot_viewport: '{"width":1280,"height":720}'
          plugin_screenshot_wait: 1000
          plugin_screenshot_background: yes

          # =========================
          # Plugin: RSS feed
          # Thay source nếu có blog/feed riêng
          # =========================
          plugin_rss: yes
          plugin_rss_source: https://github.blog/feed/
          plugin_rss_limit: 4

          # =========================
          # Plugin: Recent posts
          # Thay bằng Medium/dev.to/hashnode của bạn nếu có
          # =========================
          plugin_posts: yes
          plugin_posts_source: dev.to
          plugin_posts_user: nqd2
          plugin_posts_descriptions: yes
          plugin_posts_covers: yes
          plugin_posts_limit: 4

          # =========================
          # Plugin: LeetCode
          # Chỉ bật nếu username LeetCode đúng là nqd2
          # =========================
          plugin_leetcode: yes
          plugin_leetcode_user: nqd2
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 5

          # =========================
          # OPTIONAL PLUGINS
          # Các plugin dưới đây cần account/token ngoài GitHub.
          # Bỏ comment khi đã có secret/user id tương ứng.
          # =========================

